<html lang="en" class="h-full m-0 p-0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EPF Calculator - iOS Glassmorphic</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- ================================================================= -->
    <!-- 核心：使用内联 SVG 完美渲染的 iOS 原生高级感纯手绘 App Icon -->
    <!-- ================================================================= -->
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180' width='180' height='180'><rect width='180' height='180' rx='40' fill='%230D0E12'/><circle cx='40' cy='30' r='90' fill='%2306b6d4' opacity='0.15' filter='blur(20px)'/><circle cx='150' cy='140' r='70' fill='%234f46e5' opacity='0.2' filter='blur(25px)'/><rect x='45' y='45' width='90' height='90' rx='22' fill='rgba(255,255,255,0.03)' stroke='rgba(255,255,255,0.12)' stroke-width='1.5'/><circle cx='90' cy='90' r='32' fill='none' stroke='url(%23g1)' stroke-width='2' stroke-dasharray='4 2'/><path d='M72 105 L85 88 L95 96 L110 75' fill='none' stroke='url(%23g1)' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/><circle cx='110' cy='75' r='2.5' fill='%232dd4bf'/><defs><linearGradient id='g1' x1='0%23' y1='0%23' x2='100%23' y2='100%23'><stop offset='0%23' stop-color='%232dd4bf'/><stop offset='100%23' stop-color='%234f46e5'/></linearGradient></defs></svg>">

    <!-- iOS Add to Home Screen 全屏原生配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EPF Calc">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace']
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0d0e12;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        /* iOS 原生超透毛玻璃 */
        .ios-glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px) saturate(190%);
            -webkit-backdrop-filter: blur(25px) saturate(190%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* 键盘专用透光玻璃格子 */
        .ios-keyboard-panel {
            background: rgba(20, 22, 28, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .ios-key-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 0.5px solid rgba(255, 255, 255, 0.04);
            transition: transform 0.1s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.1s ease;
        }
        .ios-key-btn:active {
            transform: scale(0.95);
            background-color: rgba(255, 255, 255, 0.12) !important;
        }

        /* iOS 极致顺滑时间滚轮 */
        .ios-wheel {
            height: 120px; overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .ios-wheel::-webkit-scrollbar { display: none; }
        .ios-wheel div { height: 40px; line-height: 40px; scroll-snap-align: center; }
        
        .ios-mask {
            mask-image: linear-gradient(to bottom, transparent, black 35%, black 65%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 35%, black 65%, transparent);
        }

        /* 弹窗高级黑金磨砂玻璃 */
        .ios-glass-modal {
            background: rgba(10, 12, 16, 0.75);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        /* iOS 阻尼弹簧动效 */
        .modal-animate-open {
            animation: springIn 0.42s cubic-bezier(0.175, 0.885, 0.32, 1.22) forwards;
        }
        .modal-animate-close {
            animation: springOut 0.22s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
        }

        @keyframes springIn {
            0% { transform: scale(0.88); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes springOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.92); opacity: 0; }
        }

        .ios-btn-feedback {
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.2s ease, opacity 0.2s ease;
        }
        .ios-btn-feedback:active {
            transform: scale(0.97);
            background-color: rgba(255, 255, 255, 0.9);
        }

        /* 背景流体光晕 */
        .bg-blur-glow {
            position: absolute; border-radius: 50%;
            filter: blur(90px); opacity: 0.25;
            pointer-events: none; z-index: 1;
            animation: pulseGlow 8s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.2); }
        }
    </style>
</head>
<body class="h-full w-full m-0 p-0 flex flex-col justify-between text-slate-300 antialiased select-none relative overflow-hidden">

    <!-- 背景极光折射层 -->
    <div class="bg-blur-glow w-[350px] h-[350px] bg-cyan-500 top-[-50px] left-[-60px]"></div>
    <div class="bg-blur-glow w-[400px] h-[400px] bg-indigo-600 bottom-[180px] right-[-100px]" style="animation-delay: -3s;"></div>
    <div class="bg-blur-glow w-[280px] h-[280px] bg-teal-400 bottom-[-50px] left-[-30px]" style="animation-delay: -5s;"></div>

    <!-- 顶部页头 -->
    <header class="w-full max-w-md mx-auto px-6 pt-6 flex justify-between items-baseline z-10">
        <span class="text-xs tracking-[0.25em] text-white/90 font-semibold">EPF CALCULATOR</span>
    </header>

    <!-- 主体配置面板 -->
    <main class="w-full max-w-md mx-auto px-6 flex-1 flex flex-col justify-center z-10 space-y-5">
        
        <!-- Date of Birth 滚轮组件 -->
        <div class="ios-glass-panel rounded-2xl p-4 space-y-2">
            <label class="text-[10px] uppercase font-bold tracking-widest text-white/40 block">Date of Birth</label>
            <div class="relative w-full h-[120px] flex items-center ios-mask">
                <div class="absolute w-full h-10 border-y border-white/10 pointer-events-none left-0 top-10 bg-white/[0.02]"></div>
                
                <div class="w-full grid grid-cols-3 text-center text-sm font-mono text-white/40">
                    <div id="dayW" class="ios-wheel"></div>
                    <div id="monthW" class="ios-wheel"></div>
                    <div id="yearW" class="ios-wheel"></div>
                </div>
            </div>
        </div>

        <!-- Account 1 Balance 显示盘 -->
        <div class="ios-glass-panel rounded-2xl p-4 flex justify-between items-center">
            <div class="space-y-0.5">
                <label class="text-[10px] uppercase font-bold tracking-widest text-white/40 block">Account 1 Balance</label>
                <div class="flex items-baseline space-x-1 font-mono text-white">
                    <span class="text-xs text-white/40 font-sans font-bold">RM</span>
                    <span id="txtBalance" class="text-3xl font-light tracking-tight text-white drop-shadow-sm">0</span>
                </div>
            </div>
            <i class="fa fa-dot-circle-o text-white/40 text-base mr-1"></i>
        </div>

        <!-- Calculate 动作按钮 -->
        <button id="btnCalculate" class="ios-btn-feedback w-full bg-white text-black font-semibold py-3.5 rounded-xl text-xs uppercase tracking-[0.25em] shadow-lg shadow-black/20">
            Calculate
        </button>
    </main>

    <!-- 底部数字键盘 -->
    <footer class="w-full max-w-md mx-auto px-6 pb-6 z-20">
        <div id="keyboardGrid" class="grid grid-cols-3 ios-keyboard-panel rounded-2xl overflow-hidden p-1 gap-1">
            <button type="button" data-key="1" class="ios-key-btn py-4 text-white font-light text-xl font-mono rounded-xl">1</button>
            <button type="button" data-key="2" class="ios-key-btn py-4 text-white font-light text-xl font-mono rounded-xl">2</button>
            <button type="button" data-key="3" class="ios-key-btn py-4 text-white font-light text-xl font-mono rounded-xl">3</button>
            
            <button type="button" data-key="4" class="ios-key-btn py-4 text-white font-light text-xl font-mono rounded-xl">4</button>
            <button type="button" data-key="5" class="ios-key-btn py-4 text-white font-light text-xl font-mono rounded-xl">5</button>
            <button type="button" data-key="6" class="ios-key-btn py-4 text-white font-light text-xl font-mono rounded-xl">6</button>
            
            <button type="button" data-key="7" class="ios-key-btn py-4 text-white font-light text-xl font-mono rounded-xl">7</button>
            <button type="button" data-key="8" class="ios-key-btn py-4 text-white font-light text-xl font-mono rounded-xl">8</button>
            <button type="button" data-key="9" class="ios-key-btn py-4 text-white font-light text-xl font-mono rounded-xl">9</button>
            
            <button type="button" data-key="." class="ios-key-btn py-4 text-white/50 font-light text-xl font-mono rounded-xl">.</button>
            <button type="button" data-key="0" class="ios-key-btn py-4 text-white font-light text-xl font-mono rounded-xl">0</button>
            <button type="button" data-key="back" class="ios-key-btn py-4 text-white/70 flex items-center justify-center text-sm rounded-xl">
                <i class="fa fa-long-arrow-left"></i>
            </button>
        </div>
    </footer>

    <!-- iOS 阻尼弹簧弹窗 (Modal) -->
    <div id="modalOverlay" class="fixed inset-0 w-full h-full z-50 flex items-center justify-center px-8 bg-black/0 pointer-events-none transition-all duration-300">
        <div id="modalBox" class="ios-glass-modal w-full max-w-xs rounded-2xl p-6 text-center opacity-0 space-y-5">
            
            <div class="space-y-1">
                <div id="modalTitle" class="text-[10px] font-bold tracking-[0.25em] text-teal-400 uppercase">Analysis Complete</div>
                <div class="text-[11px] text-white/40 font-light" id="modalAgeLabel">Age Profile</div>
            </div>
            
            <!-- Eligible Amount 主显示区 -->
            <div class="py-3 border-y border-white/[0.08] space-y-0.5">
                <span class="text-xs text-white/50 font-light block">Eligible Amount</span>
                <span id="modalValue" class="text-3xl font-light font-mono text-white tracking-tight">RM 0.00</span>
            </div>

            <!-- 文案区域 -->
            <p id="modalDetail" class="text-[11px] text-white/60 font-light leading-relaxed px-1 font-mono tracking-wide"></p>

            <button id="btnCloseModal" class="ios-btn-feedback w-full bg-white/10 border border-white/10 text-white font-medium py-2.5 rounded-xl text-xs uppercase tracking-widest">
                Dismiss
            </button>
        </div>
    </div>

    <script>
        // 马来西亚公积金基本预留要求指标数据表 (2026最新标准)
        const basicSavings = {
            18: 900, 19: 1100, 20: 1500, 21: 1900, 22: 4000, 23: 6200, 24: 8500,
            25: 11000, 26: 13700, 27: 16600, 28: 19600, 29: 22900, 30: 26300,
            31: 30000, 32: 33900, 33: 38100, 34: 42400, 35: 47000, 36: 51900,
            37: 57000, 38: 62400, 39: 68100, 40: 74000, 41: 80200, 42: 86700,
            43: 93600, 44: 100000, 45: 108000, 46: 115000, 47: 124000, 48: 132000,
            49: 141000, 50: 150000, 51: 160000, 52: 170000, 53: 181000, 54: 192000,
            55: 203000, 56: 216000, 57: 228000, 58: 241000, 59: 255000, 60: 270000
        };

        const dayW = document.getElementById('dayW'), monthW = document.getElementById('monthW'), yearW = document.getElementById('yearW');
        const txtBalance = document.getElementById('txtBalance');
        const btnCalculate = document.getElementById('btnCalculate');
        
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBox = document.getElementById('modalBox');
        const modalTitle = document.getElementById('modalTitle');
        const modalAgeLabel = document.getElementById('modalAgeLabel');
        const modalValue = document.getElementById('modalValue');
        const modalDetail = document.getElementById('modalDetail');
        const btnCloseModal = document.getElementById('btnCloseModal');

        let sDay = 15, sMonth = 5, sYear = 1995;
        let inputString = "50000"; 

        function init() {
            setupDateWheels();
            setupKeyboard();
            renderBalanceDisplay();
            
            btnCalculate.addEventListener('click', openSpringModal);
            btnCloseModal.addEventListener('click', closeSpringModal);
        }

        function setupKeyboard() {
            document.querySelectorAll('#keyboardGrid button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const key = btn.dataset.key;
                    if (key === 'back') {
                        inputString = inputString.slice(0, -1);
                        if (inputString === "") inputString = "0";
                    } else if (key === '.') {
                        if (!inputString.includes('.')) inputString += '.';
                    } else {
                        if (inputString === "0") inputString = key;
                        else inputString += key;
                    }
                    renderBalanceDisplay();
                });
            });
        }

        function renderBalanceDisplay() {
            let num = parseFloat(inputString) || 0;
            if (inputString.endsWith('.')) {
                txtBalance.textContent = num.toLocaleString('en-US') + '.';
            } else {
                const parts = inputString.split('.');
                if(parts[1] !== undefined) {
                    txtBalance.textContent = (parseInt(parts[0]) || 0).toLocaleString('en-US') + '.' + parts[1];
                } else {
                    txtBalance.textContent = num.toLocaleString('en-US');
                }
            }
        }

        function setupDateWheels() {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const pad = '<div class="pointer-events-none"></div>';
            
            let dH = pad; for(let i=1; i<=31; i++) dH += `<div data-val="${i}">${String(i).padStart(2,'0')}</div>`; dayW.innerHTML = dH + pad;
            let mH = pad; months.forEach((m, idx) => { mH += `<div data-val="${idx}">${m}</div>`; }); monthW.innerHTML = mH + pad;
            let yH = pad; for(let i = new Date().getFullYear() - 60; i <= new Date().getFullYear() - 18; i++) yH += `<div data-val="${i}">${i}</div>`; yearW.innerHTML = yH + pad;

            setTimeout(() => {
                locateWheelPosition(dayW, sDay); locateWheelPosition(monthW, sMonth); locateWheelPosition(yearW, sYear);
            }, 50);

            listenWheelScroll(dayW, (v) => sDay = v);
            listenWheelScroll(monthW, (v) => sMonth = v);
            listenWheelScroll(yearW, (v) => sYear = v);
        }

        function locateWheelPosition(wheel, val) {
            const targetEl = wheel.querySelector(`[data-val="${val}"]`);
            if (targetEl) wheel.scrollTop = targetEl.offsetTop - 40;
        }

        function listenWheelScroll(wheel, callback) {
            wheel.addEventListener('scroll', () => {
                clearTimeout(wheel.t);
                wheel.t = setTimeout(() => {
                    const nodes = wheel.querySelectorAll('div:not(.pointer-events-none)');
                    const wheelCenter = wheel.getBoundingClientRect().top + 60; 
                    let nearestNode = null, minDiff = Infinity;
                    
                    nodes.forEach(node => {
                        const diff = Math.abs((node.getBoundingClientRect().top + 20) - wheelCenter);
                        if(diff < minDiff) { minDiff = diff; nearestNode = node; }
                    });
                    
                    if(nearestNode) {
                        nodes.forEach(n => n.className = "text-white/20 font-light");
                        nearestNode.className = "text-white font-bold text-base transition-all duration-200 drop-shadow-md";
                        callback(parseInt(nearestNode.dataset.val));
                    }
                }, 50);
            });
        }

        function openSpringModal() {
            const currentBalance = parseFloat(inputString) || 0;
            const today = new Date();
            
            let age = today.getFullYear() - sYear;
            if (today.getMonth() < sMonth || (today.getMonth() === sMonth && today.getDate() < sDay)) age--;

            const targetRequirement = age >= 60 ? basicSavings[60] : (age <= 18 ? basicSavings[18] : (basicSavings[age] || basicSavings[45]));
            const excessAmount = Math.max(0, currentBalance - targetRequirement);
            const eligibleInvestment = excessAmount * 0.30;

            modalAgeLabel.textContent = `Client Age Profile: ${age} Years Old`;

            if (eligibleInvestment >= 1000) {
                modalTitle.textContent = "✔ Eligible for Investment";
                modalTitle.className = "text-[10px] font-bold tracking-[0.25em] text-teal-400 uppercase";
                modalValue.textContent = `RM ${eligibleInvestment.toLocaleString('en-US', {minimumFractionDigits:2})}`;
                modalValue.className = "text-3xl font-light font-mono text-teal-400 tracking-tight";
                modalDetail.textContent = `Basic Savings : RM ${targetRequirement.toLocaleString('en-US')}`;
            } else {
                modalTitle.textContent = "✕ Below Threshold";
                modalTitle.className = "text-[10px] font-bold tracking-[0.25em] text-rose-400 uppercase";
                modalValue.textContent = `RM 0.00`;
                modalValue.className = "text-3xl font-light font-mono text-white/30 tracking-tight";
                modalDetail.textContent = `Basic Savings : RM ${targetRequirement.toLocaleString('en-US')}`;
            }

            modalOverlay.classList.remove('pointer-events-none');
            modalOverlay.classList.add('bg-black/50'); 
            modalOverlay.style.backdropFilter = "blur(8px)";
            metaOverlay = "blur(8px)";
            modalOverlay.style.webkitBackdropFilter = "blur(8px)";
            
            modalBox.classList.remove('modal-animate-close');
            modalBox.classList.add('modal-animate-open');
        }

        function closeSpringModal() {
            modalOverlay.classList.remove('bg-black/50');
            modalOverlay.style.backdropFilter = "none";
            modalOverlay.style.webkitBackdropFilter = "none";
            modalOverlay.classList.add('pointer-events-none');
            
            modalBox.classList.remove('modal-animate-open');
            modalBox.classList.add('modal-animate-close');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
