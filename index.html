<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>EPF Eligibility Calculator</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #121826;
      --muted: #697386;
      --line: rgba(255, 255, 255, 0.56);
      --glass: rgba(255, 255, 255, 0.58);
      --glass-strong: rgba(255, 255, 255, 0.76);
      --blue: #0a62ff;
      --blue-deep: #0f43bd;
      --blue-soft: #dceaff;
      --green: #0a8f63;
      --red: #c5324d;
      --amber: #a36a00;
      --shadow: 0 28px 80px rgba(26, 38, 63, 0.18);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, Segoe UI, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      color: var(--ink);
      background:
        linear-gradient(155deg, rgba(231, 241, 255, 0.96) 0%, rgba(250, 253, 255, 0.98) 35%, rgba(237, 246, 241, 0.94) 72%, rgba(255, 248, 235, 0.9) 100%);
      overflow-x: hidden;
    }

    body.modal-open {
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(110deg, rgba(255, 255, 255, 0.54), rgba(255, 255, 255, 0) 42%),
        repeating-linear-gradient(120deg, rgba(255, 255, 255, 0.18) 0 1px, transparent 1px 38px);
      opacity: 0.82;
    }

    .screen {
      position: relative;
      width: min(100%, 560px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(24px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 7px 2px;
    }

    .title-block {
      display: grid;
      gap: 3px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 7.2vw, 42px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .eyebrow {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .year-pill {
      min-width: 92px;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.52));
      box-shadow:
        0 16px 36px rgba(26, 38, 63, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      color: var(--blue-deep);
      font-size: 19px;
      font-weight: 920;
      backdrop-filter: blur(24px) saturate(1.35);
      -webkit-backdrop-filter: blur(24px) saturate(1.35);
    }

    .glass {
      border: 1px solid var(--line);
      border-radius: 36px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.54)),
        var(--glass);
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(34px) saturate(1.55);
      -webkit-backdrop-filter: blur(34px) saturate(1.55);
    }

    .panel {
      padding: 20px;
    }

    .form {
      display: grid;
      gap: 16px;
    }

    label,
    .field-label {
      display: grid;
      gap: 8px;
      color: #2a3448;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 850;
    }

    .field {
      width: 100%;
      min-height: 66px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 24px;
      outline: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.98),
        0 16px 34px rgba(23, 32, 52, 0.08);
      color: var(--ink);
      font: inherit;
      font-size: 23px;
      font-weight: 900;
      padding: 0 18px;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .field:focus {
      border-color: rgba(10, 98, 255, 0.62);
      background: rgba(255, 255, 255, 0.84);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.98),
        0 0 0 5px rgba(10, 98, 255, 0.14),
        0 18px 38px rgba(10, 98, 255, 0.08);
    }

    .field::placeholder {
      color: #9aa5b8;
      font-weight: 650;
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    .amount-wrap {
      position: relative;
    }

    .amount-wrap .prefix {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 22px;
      font-weight: 900;
      pointer-events: none;
    }

    .amount-wrap .field {
      padding-left: 66px;
    }

    .calculate-button {
      min-height: 64px;
      width: 100%;
      border: 0;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(13, 111, 255, 0.98), rgba(7, 48, 161, 0.98)),
        var(--blue);
      color: #ffffff;
      box-shadow:
        0 18px 42px rgba(10, 98, 255, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.34);
      font: inherit;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    .calculate-button:active {
      transform: scale(0.98);
      box-shadow:
        0 9px 22px rgba(10, 98, 255, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    .dob-control {
      display: grid;
      gap: 8px;
    }

    .dob-wheel {
      position: relative;
      display: grid;
      grid-template-columns: 0.78fr 1.18fr 0.9fr;
      gap: 0;
      min-height: 176px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.66));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.98),
        0 18px 40px rgba(23, 32, 52, 0.08);
      overflow: hidden;
    }

    .dob-wheel::before,
    .dob-wheel::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      z-index: 3;
      height: 56px;
      pointer-events: none;
    }

    .dob-wheel::before {
      top: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0));
    }

    .dob-wheel::after {
      bottom: 0;
      background: linear-gradient(0deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0));
    }

    .wheel-selection {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 50%;
      z-index: 1;
      height: 52px;
      border: 1px solid rgba(10, 98, 255, 0.2);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(228, 239, 255, 0.92), rgba(214, 229, 253, 0.76));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.88),
        0 8px 22px rgba(10, 98, 255, 0.08);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .wheel-column {
      position: relative;
      z-index: 2;
      height: 176px;
      padding: 62px 4px;
      overflow-y: auto;
      overscroll-behavior: contain;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .wheel-column::-webkit-scrollbar {
      display: none;
    }

    .wheel-column + .wheel-column {
      border-left: 1px solid rgba(105, 115, 134, 0.12);
    }

    .wheel-option {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      color: rgba(18, 24, 38, 0.44);
      font-size: 19px;
      font-weight: 780;
      line-height: 1;
      user-select: none;
      transition: color 120ms ease, transform 120ms ease;
    }

    .wheel-option.is-selected {
      color: var(--ink);
      font-size: 25px;
      font-weight: 940;
      transform: scale(1.02);
    }

    .result-card {
      position: relative;
      width: 100%;
      max-height: min(82svh, 680px);
      overflow-y: auto;
      padding: 14px;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(247, 251, 250, 0.78)),
        rgba(255, 255, 255, 0.74);
      box-shadow:
        0 28px 78px rgba(23, 32, 52, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.94);
    }

    .status {
      position: relative;
      padding: 18px;
      color: #ffffff;
      background: linear-gradient(135deg, #265eea, #043aa8);
      display: grid;
      gap: 14px;
      min-height: 116px;
      overflow: hidden;
      border-radius: 26px;
      box-shadow:
        0 18px 40px rgba(6, 117, 81, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .status::after {
      content: "";
      position: absolute;
      inset: -40% auto auto 36%;
      width: 42%;
      height: 190%;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0));
      transform: rotate(18deg);
      pointer-events: none;
    }

    .status[data-state="eligible"] {
      background:
        linear-gradient(135deg, rgba(25, 181, 130, 0.98), rgba(5, 108, 77, 0.98)),
        #0d8a61;
    }

    .status[data-state="not-eligible"] {
      background:
        linear-gradient(135deg, rgba(214, 64, 94, 0.98), rgba(132, 18, 56, 0.98)),
        #b6264b;
    }

    .status[data-state="waiting"] {
      background:
        linear-gradient(135deg, rgba(64, 105, 222, 0.98), rgba(28, 60, 138, 0.98)),
        #244eb0;
    }

    .status-label {
      position: relative;
      z-index: 1;
      margin: 0;
      width: fit-content;
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
      opacity: 0.95;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eligible-amount {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 100%;
      font-size: clamp(30px, 8vw, 44px);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 900;
      white-space: nowrap;
      overflow-wrap: normal;
      text-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    }

    .metrics {
      padding: 12px 0 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      container-type: inline-size;
      min-height: 80px;
      padding: 14px 13px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.58));
      display: grid;
      align-content: space-between;
      gap: 7px;
      box-shadow:
        0 10px 24px rgba(23, 32, 52, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.88);
    }

    .metric span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      font-weight: 820;
    }

    .metric strong {
      color: var(--ink);
      font-size: 21px;
      line-height: 1.08;
      font-weight: 920;
      white-space: nowrap;
      overflow-wrap: normal;
    }

    .metric strong.amount-value {
      font-size: clamp(14px, 13cqw, 21px);
      letter-spacing: 0;
    }

    .formula {
      margin: 12px 0 0;
      padding: 13px 14px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(230, 236, 239, 0.72), rgba(220, 228, 232, 0.58));
      color: #2f3b50;
      font-size: clamp(12px, 3.3vw, 15px);
      line-height: 1.42;
      font-weight: 820;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: max(28px, env(safe-area-inset-top)) 22px max(28px, env(safe-area-inset-bottom));
      background:
        linear-gradient(155deg, rgba(238, 246, 255, 0.52), rgba(244, 248, 247, 0.42)),
        rgba(236, 242, 247, 0.46);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      backdrop-filter: blur(22px) saturate(1.45);
      -webkit-backdrop-filter: blur(22px) saturate(1.45);
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .modal-overlay.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .modal-sheet {
      position: relative;
      width: min(100%, 450px);
      max-height: calc(100dvh - 72px);
      transform: scale(0.96);
      transition: transform 220ms ease, opacity 220ms ease;
    }

    .modal-overlay.is-open .modal-sheet {
      transform: scale(1);
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 2;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      font-size: 24px;
      line-height: 1;
      font-weight: 400;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.42);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .modal-close:active {
      transform: scale(0.96);
    }

    .modal-close:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.72);
      outline-offset: 2px;
    }

    .reference-trigger {
      min-height: 64px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.58));
      box-shadow:
        0 18px 46px rgba(23, 32, 52, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.92);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      cursor: pointer;
      color: #263249;
      font: inherit;
      font-size: 17px;
      font-weight: 900;
      backdrop-filter: blur(26px) saturate(1.4);
      -webkit-backdrop-filter: blur(26px) saturate(1.4);
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    .reference-trigger:active {
      transform: scale(0.985);
      box-shadow:
        0 11px 28px rgba(23, 32, 52, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.86);
    }

    .reference-trigger::after {
      content: "";
      width: 12px;
      height: 12px;
      border-right: 2px solid var(--blue);
      border-bottom: 2px solid var(--blue);
      transform: rotate(-45deg);
      flex: 0 0 auto;
    }

    .reference-card {
      width: 100%;
      max-height: min(82svh, 680px);
      overflow: hidden;
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.76);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(247, 251, 252, 0.78)),
        rgba(255, 255, 255, 0.78);
      box-shadow:
        0 30px 85px rgba(23, 32, 52, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(28px) saturate(1.45);
      -webkit-backdrop-filter: blur(28px) saturate(1.45);
    }

    .reference-head {
      position: relative;
      overflow: hidden;
      padding: 24px 60px 20px 22px;
      background:
        linear-gradient(135deg, rgba(25, 91, 205, 0.98), rgba(9, 51, 143, 0.98)),
        var(--blue-deep);
      color: #ffffff;
    }

    .reference-head::after {
      content: "";
      position: absolute;
      inset: -46% auto auto 38%;
      width: 40%;
      height: 190%;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0));
      transform: rotate(18deg);
      pointer-events: none;
    }

    .reference-head p,
    .reference-head h2 {
      margin: 0;
    }

    .reference-head p {
      opacity: 0.82;
      font-size: 12px;
      font-weight: 820;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .reference-head h2 {
      margin-top: 5px;
      font-size: 25px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .reference-close {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.2);
    }

    .table-wrap {
      max-height: min(62svh, 520px);
      padding: 16px;
      overflow: auto;
    }

    table {
      width: 100%;
      min-width: 430px;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    th,
    td {
      padding: 12px 13px;
      border-bottom: 1px solid rgba(105, 115, 134, 0.16);
      text-align: right;
      font-size: 13px;
      font-weight: 820;
    }

    th:first-child,
    td:first-child {
      text-align: left;
    }

    th {
      color: #ffffff;
      background: linear-gradient(135deg, #195bcd, #09338f);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tr.is-current td {
      color: var(--blue-deep);
      background: rgba(10, 98, 255, 0.1);
      font-weight: 920;
    }

    @media (min-width: 720px) {
      .screen {
        padding-block: max(34px, env(safe-area-inset-top)) max(34px, env(safe-area-inset-bottom));
      }

      .panel {
        padding: 20px;
      }

      .form {
        grid-template-columns: 1.12fr 0.88fr;
        align-items: start;
      }

      .calculate-button {
        grid-column: 1 / -1;
      }

    }

    @media (max-height: 720px) {
      .screen {
        justify-content: flex-start;
        gap: 13px;
      }

      .dob-wheel {
        min-height: 154px;
      }

      .wheel-column {
        height: 154px;
        padding-block: 51px;
      }

      .wheel-option {
        height: 52px;
      }
    }
  </style>
</head>
<body>
  <main class="screen">
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">Account Persaraan</p>
        <h1>Eligibility Calculator</h1>
      </div>
      <div class="year-pill">2026</div>
    </header>

    <section class="glass panel" aria-label="Eligibility inputs">
      <div class="form">
        <div class="dob-control">
          <div id="dobLabel" class="field-label">Customer DOB</div>
          <div class="dob-wheel" role="group" aria-labelledby="dobLabel">
            <div class="wheel-selection" aria-hidden="true"></div>
            <div id="dayWheel" class="wheel-column" role="listbox" aria-label="Day" tabindex="0"></div>
            <div id="monthWheel" class="wheel-column" role="listbox" aria-label="Month" tabindex="0"></div>
            <div id="yearWheel" class="wheel-column" role="listbox" aria-label="Year" tabindex="0"></div>
          </div>
        </div>

        <label>
          Account Persaraan Amount
          <div class="amount-wrap">
            <span class="prefix">RM</span>
            <input id="balance" class="field" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00" aria-label="Account Persaraan amount">
          </div>
        </label>

        <button id="calculateButton" class="calculate-button" type="button">Calculate</button>
      </div>
    </section>

    <button id="openReference" class="reference-trigger" type="button">View Basic Savings Reference</button>

  </main>

  <div id="resultModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="statusLabel">
      <button id="closeModal" class="modal-close" type="button" aria-label="Close result" title="Close">&times;</button>
      <section class="glass result-card" aria-live="polite" aria-label="Eligibility result">
        <div id="statusPanel" class="status" data-state="waiting">
          <p class="status-label" id="statusLabel">Ready</p>
          <p class="eligible-amount" id="eligibleAmount">RM0</p>
        </div>

        <div class="metrics">
          <div class="metric">
            <span>Age</span>
            <strong id="ageValue">-</strong>
          </div>
          <div class="metric">
            <span>Basic Savings</span>
            <strong id="basicValue">-</strong>
          </div>
          <div class="metric">
            <span>Excess Savings</span>
            <strong id="excessValue">-</strong>
          </div>
          <div class="metric">
            <span>Investment 30%</span>
            <strong id="investmentValue">-</strong>
          </div>
        </div>

        <p class="formula" id="formulaValue">Calculation will appear here.</p>
      </section>
    </div>
  </div>

  <div id="referenceModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="referenceTitle">
      <button id="closeReference" class="modal-close reference-close" type="button" aria-label="Close reference" title="Close">&times;</button>
      <section class="reference-card" aria-label="2026 Basic Savings reference">
        <div class="reference-head">
          <p>Account Persaraan</p>
          <h2 id="referenceTitle">2026 Basic Savings</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Age</th>
                <th>Basic Savings</th>
                <th>Age</th>
                <th>Basic Savings</th>
              </tr>
            </thead>
            <tbody id="savingsTable"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    const BASIC_SAVINGS = {
      18: 900,
      19: 1100,
      20: 1500,
      21: 1900,
      22: 4000,
      23: 6200,
      24: 8500,
      25: 11000,
      26: 13700,
      27: 16600,
      28: 19600,
      29: 22900,
      30: 26300,
      31: 30000,
      32: 33900,
      33: 38100,
      34: 42400,
      35: 47000,
      36: 51900,
      37: 57000,
      38: 62400,
      39: 68100,
      40: 74000,
      41: 80200,
      42: 86700,
      43: 93600,
      44: 100000,
      45: 108000,
      46: 115000,
      47: 124000,
      48: 132000,
      49: 141000,
      50: 150000,
      51: 160000,
      52: 170000,
      53: 181000,
      54: 192000,
      55: 203000,
      56: 216000,
      57: 228000,
      58: 241000,
      59: 255000,
      60: 270000
    };

    const MIN_ELIGIBILITY = 1000;
    const RATE = 0.3;
    const WHEEL_ITEM_HEIGHT = 52;
    const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const dayWheel = document.getElementById("dayWheel");
    const monthWheel = document.getElementById("monthWheel");
    const yearWheel = document.getElementById("yearWheel");
    const balanceInput = document.getElementById("balance");
    const resultModal = document.getElementById("resultModal");
    const closeModal = document.getElementById("closeModal");
    const referenceModal = document.getElementById("referenceModal");
    const openReference = document.getElementById("openReference");
    const closeReference = document.getElementById("closeReference");
    const calculateButton = document.getElementById("calculateButton");
    const statusPanel = document.getElementById("statusPanel");
    const statusLabel = document.getElementById("statusLabel");
    const eligibleAmount = document.getElementById("eligibleAmount");
    const ageValue = document.getElementById("ageValue");
    const basicValue = document.getElementById("basicValue");
    const excessValue = document.getElementById("excessValue");
    const investmentValue = document.getElementById("investmentValue");
    const formulaValue = document.getElementById("formulaValue");
    const savingsTable = document.getElementById("savingsTable");
    const selectedDob = {
      day: 1,
      month: 1,
      year: new Date().getFullYear() - 25
    };

    const money = new Intl.NumberFormat("en-MY", {
      style: "currency",
      currency: "MYR",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    function formatRM(value) {
      if (!Number.isFinite(value)) return "-";
      return money.format(Math.max(0, value)).replace("MYR", "RM");
    }

    function daysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function getSelectedDob() {
      return new Date(selectedDob.year, selectedDob.month - 1, selectedDob.day);
    }

    function renderWheel(wheel, values, selectedValue, formatter) {
      wheel.innerHTML = values.map((value) => {
        const selected = value === selectedValue ? " is-selected" : "";
        return `<div class="wheel-option${selected}" role="option" aria-selected="${value === selectedValue}" data-value="${value}">${formatter(value)}</div>`;
      }).join("");
      const index = Math.max(0, values.indexOf(selectedValue));
      requestAnimationFrame(() => {
        wheel.scrollTop = index * WHEEL_ITEM_HEIGHT;
      });
    }

    function updateWheelSelection(wheel, selectedValue) {
      wheel.querySelectorAll(".wheel-option").forEach((option) => {
        const isSelected = Number(option.dataset.value) === selectedValue;
        option.classList.toggle("is-selected", isSelected);
        option.setAttribute("aria-selected", String(isSelected));
      });
    }

    function renderDobWheels() {
      const currentYear = new Date().getFullYear();
      const years = Array.from({ length: 91 }, (_, index) => currentYear - index);
      const months = Array.from({ length: 12 }, (_, index) => index + 1);
      const days = Array.from({ length: daysInMonth(selectedDob.year, selectedDob.month) }, (_, index) => index + 1);

      if (selectedDob.day > days.length) selectedDob.day = days.length;

      renderWheel(dayWheel, days, selectedDob.day, (value) => String(value).padStart(2, "0"));
      renderWheel(monthWheel, months, selectedDob.month, (value) => MONTHS[value - 1]);
      renderWheel(yearWheel, years, selectedDob.year, (value) => String(value));
    }

    function syncWheelFromScroll(wheel, key) {
      const options = Array.from(wheel.querySelectorAll(".wheel-option"));
      const index = Math.min(options.length - 1, Math.max(0, Math.round(wheel.scrollTop / WHEEL_ITEM_HEIGHT)));
      const value = Number(options[index]?.dataset.value);
      if (!Number.isFinite(value) || selectedDob[key] === value) return;

      selectedDob[key] = value;
      if (key === "month" || key === "year") {
        const maxDay = daysInMonth(selectedDob.year, selectedDob.month);
        if (selectedDob.day > maxDay) selectedDob.day = maxDay;
        renderDobWheels();
      } else {
        updateWheelSelection(wheel, value);
      }
      calculateEligibility(false);
    }

    function attachWheel(wheel, key) {
      let scrollTimer = null;
      wheel.addEventListener("scroll", () => {
        window.clearTimeout(scrollTimer);
        scrollTimer = window.setTimeout(() => syncWheelFromScroll(wheel, key), 80);
      }, { passive: true });

      wheel.addEventListener("keydown", (event) => {
        if (event.key !== "ArrowUp" && event.key !== "ArrowDown") return;
        event.preventDefault();
        const direction = event.key === "ArrowDown" ? 1 : -1;
        wheel.scrollBy({ top: direction * WHEEL_ITEM_HEIGHT, behavior: "smooth" });
      });
    }

    function getAge(dob) {
      const today = new Date();
      let age = today.getFullYear() - dob.getFullYear();
      const birthdayThisYear = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());
      if (today < birthdayThisYear) age -= 1;
      return age;
    }

    function openResultModal() {
      hideReferenceModal();
      resultModal.classList.add("is-open");
      resultModal.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
    }

    function hideResultModal() {
      resultModal.classList.remove("is-open");
      resultModal.setAttribute("aria-hidden", "true");
      syncModalLock();
    }

    function openReferenceModal() {
      hideResultModal();
      referenceModal.classList.add("is-open");
      referenceModal.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
    }

    function hideReferenceModal() {
      referenceModal.classList.remove("is-open");
      referenceModal.setAttribute("aria-hidden", "true");
      syncModalLock();
    }

    function syncModalLock() {
      const anyModalOpen = resultModal.classList.contains("is-open") || referenceModal.classList.contains("is-open");
      document.body.classList.toggle("modal-open", anyModalOpen);
    }

    function setWaiting(message) {
      statusPanel.dataset.state = "waiting";
      statusLabel.textContent = "Ready";
      eligibleAmount.textContent = "RM0";
      ageValue.textContent = "-";
      basicValue.textContent = "-";
      excessValue.textContent = "-";
      investmentValue.textContent = "-";
      formulaValue.textContent = "Calculation will appear here.";
      highlightCurrentAge(null);
      hideResultModal();
    }

    function calculateEligibility(showModal = false) {
      const dob = getSelectedDob();
      const balance = Number(balanceInput.value);

      if (!Number.isFinite(balance) || balanceInput.value === "") {
        setWaiting("Enter Account Persaraan amount to calculate.");
        return;
      }

      if (dob > new Date()) {
        setWaiting("DOB cannot be in the future.");
        return;
      }

      const age = getAge(dob);
      const basic = BASIC_SAVINGS[age];

      ageValue.textContent = String(age);
      highlightCurrentAge(age);

      if (!basic) {
        statusPanel.dataset.state = "not-eligible";
        statusLabel.textContent = "Not Eligible";
        eligibleAmount.textContent = "RM0";
        basicValue.textContent = "-";
        excessValue.textContent = "-";
        investmentValue.textContent = "-";
        formulaValue.textContent = "No 2026 Basic Savings value is available for this age.";
        if (showModal) openResultModal();
        return;
      }

      const excess = Math.max(0, balance - basic);
      const investment = excess * RATE;
      const roundedInvestment = Math.floor(investment * 100) / 100;

      setMoneyValue(basicValue, basic);
      setMoneyValue(excessValue, excess);
      setMoneyValue(investmentValue, roundedInvestment);

      if (balance <= basic) {
        statusPanel.dataset.state = "not-eligible";
        statusLabel.textContent = "Not Eligible";
        eligibleAmount.textContent = "RM0";
        formulaValue.textContent = `${formatRM(balance)} - ${formatRM(basic)} = ${formatRM(excess)} excess savings.`;
        if (showModal) openResultModal();
        return;
      }

      formulaValue.textContent = `(${formatRM(balance)} - ${formatRM(basic)}) x 30% = ${formatRM(roundedInvestment)}`;

      if (roundedInvestment < MIN_ELIGIBILITY) {
        statusPanel.dataset.state = "not-eligible";
        statusLabel.textContent = "Not Eligible";
        eligibleAmount.textContent = formatRM(roundedInvestment);
        if (showModal) openResultModal();
        return;
      }

      statusPanel.dataset.state = "eligible";
      statusLabel.textContent = "Eligible";
      eligibleAmount.textContent = formatRM(roundedInvestment);
      if (showModal) openResultModal();
    }

    function buildSavingsTable() {
      const leftAges = Array.from({ length: 22 }, (_, index) => index + 18);
      const rightAges = Array.from({ length: 21 }, (_, index) => index + 40);
      savingsTable.innerHTML = leftAges.map((leftAge, index) => {
        const rightAge = rightAges[index];
        const rightCells = rightAge
          ? `<td>${rightAge}</td><td>${formatRM(BASIC_SAVINGS[rightAge])}</td>`
          : `<td></td><td></td>`;
        return `<tr data-left-age="${leftAge}" data-right-age="${rightAge || ""}">
          <td>${leftAge}</td>
          <td>${formatRM(BASIC_SAVINGS[leftAge])}</td>
          ${rightCells}
        </tr>`;
      }).join("");
    }

    function setMoneyValue(element, value) {
      element.textContent = formatRM(value);
      element.classList.add("amount-value");
    }

    function highlightCurrentAge(age) {
      document.querySelectorAll("#savingsTable tr").forEach((row) => {
        row.classList.toggle("is-current", row.dataset.leftAge === String(age) || row.dataset.rightAge === String(age));
      });
    }

    buildSavingsTable();
    renderDobWheels();
    attachWheel(dayWheel, "day");
    attachWheel(monthWheel, "month");
    attachWheel(yearWheel, "year");
    balanceInput.addEventListener("input", () => {
      calculateEligibility(false);
    });
    balanceInput.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      balanceInput.blur();
      calculateEligibility(true);
    });
    calculateButton.addEventListener("click", () => {
      balanceInput.blur();
      calculateEligibility(true);
    });
    closeModal.addEventListener("click", hideResultModal);
    resultModal.addEventListener("click", (event) => {
      if (event.target === resultModal) hideResultModal();
    });
    openReference.addEventListener("click", openReferenceModal);
    closeReference.addEventListener("click", hideReferenceModal);
    referenceModal.addEventListener("click", (event) => {
      if (event.target === referenceModal) hideReferenceModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      hideResultModal();
      hideReferenceModal();
    });
    setWaiting("Enter Account Persaraan amount to calculate.");
  </script>
</body>
</html>
