<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EPF Investment Calculator</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#6B7280',
                        success: '#10B981',
                        warning: '#F59E0B',
                        danger: '#EF4444',
                        info: '#06B6D4',
                        light: '#F8FAFC',
                        dark: '#0c1220',
                        'dark-card': '#162032',
                        'dark-input': '#1e293b',
                        'gradient-1': '#3B82F6',
                        'gradient-2': '#2563EB',
                        'gradient-3': '#1D4ED8'
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif']
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shine': 'shine 2s infinite'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        },
                        shine: {
                            '0%': { backgroundPosition: '100% center' },
                            '100%': { backgroundPosition: '-100% center' }
                        }
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.37)',
                        'neon': '0 0 5px theme("colors.primary"), 0 0 20px theme("colors.primary")'
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Custom styles */
        .dark-card {
            background: #162032;
            border: 1px solid #2a3a50;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .date-scroll-container {
            height: 10rem;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            position: relative;
        }
        
        .date-scroll-container::-webkit-scrollbar {
            display: none;
        }
        
        .date-highlight {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 3rem;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 10;
        }
        
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Advanced glass morphism effects */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        
        .dark .glass-card {
            background: rgba(22, 32, 50, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        /* Animated background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(59, 130, 246, 0.08), transparent);
            animation: float 15s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(-25%, -25%) rotate(0deg); }
            50% { transform: translate(-25%, -25%) rotate(360deg); }
        }
        
        /* Neon glow effects */
        .neon-glow {
            box-shadow: 0 0 5px theme('colors.primary'), 0 0 20px theme('colors.primary');
        }
        
        /* Data animation effects */
        .data-value {
            display: inline-block;
            opacity: 0;
            transform: translateY(10px);
            animation: slideUp 0.6s ease forwards;
        }
        
        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Button ripple effect */
        .btn-ripple {
            position: relative;
            overflow: hidden;
        }
        
        .btn-ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn-ripple:active::after {
            width: 300px;
            height: 300px;
        }
        
        /* Input focus animation */
        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .dark .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
        }
        
        .dark .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .ios-toggle {
            position: relative;
            display: inline-block;
            width: 3rem;
            height: 1.5rem;
            transition: all 0.2s ease;
        }
        
        .ios-toggle-checkbox {
            position: absolute;
            display: block;
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            background: white;
            border: 4px solid #d1d5db;
            appearance: none;
            cursor: pointer;
            transition: all 0.2s ease;
            left: 0;
            top: 0;
            z-index: 10;
        }
        
        .ios-toggle-checkbox:checked {
            transform: translateX(1.5rem);
            border-color: white;
        }
        
        .ios-toggle-bg {
            position: absolute;
            display: block;
            width: 3rem;
            height: 1.5rem;
            border-radius: 0.75rem;
            background: #d1d5db;
            transition: all 0.2s ease;
        }
        
        .ios-toggle-checkbox:checked + .ios-toggle-bg {
            background: #3B82F6;
        }
        
        .bg-gradient-light {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        
        .text-gradient {
            background: linear-gradient(135deg, #3B82F6 0%, #60A5FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .bg-gradient-primary {
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
        }
        
        .bg-gradient-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .dark .bg-gradient-card {
            background: rgba(22, 32, 50, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .card-glow {
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }
        
        .dark .card-glow {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .btn-shine {
            position: relative;
            overflow: hidden;
        }
        
        .btn-shine::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-shine:hover::before {
            left: 100%;
        }
        
        .input-focus-ring {
            transition: all 0.3s ease;
        }
        
        .input-focus-ring:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }
        
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }
        
        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Dark data dashboard specific styles */
        .dark .bg-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
        }
        
        .dark .gradient-border::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #3B82F6, #60A5FA);
        }
    </style>
</head>
<body class="bg-gradient-light dark:bg-dark min-h-screen font-sans text-gray-800 dark:text-gray-100 overflow-x-hidden">
    <!-- Animated Background -->

    <!-- iOS Style Dark Mode Toggle -->

</h3>

                                            <div id="yearScroll" class="date-scroll flex flex-col items-center pt-[40px] pb-[40px] h-40 overflow-y-auto scrollbar-hide">

            <!-- Result Card -->

                <!-- Eligibility Section -->

</h3>

                                <div id="resultBalance" class="font-semibold">-</div>

                    </div>

        <!-- Footer -->

            <p style="font-size: 12px; font-style: italic;">This calculator is for reference only。</p>

    </div>

    <script>
        // Basic savings requirements by age
        const basicSavings = {
            19: 900, 20: 1500, 21: 1900, 22: 4000, 23: 8500, 24: 10000,
            25: 11700, 26: 16600, 27: 22600, 28: 26300, 29: 35000, 30: 38000,
            31: 42400, 32: 47000, 33: 51700, 34: 56500, 35: 60800, 36: 65300,
            37: 69900, 38: 74700, 39: 79600, 40: 84700, 41: 89900, 42: 95300,
            43: 100800, 44: 106500, 45: 108000, 46: 118300, 47: 124400, 48: 130700,
            49: 137100, 50: 143700, 51: 150400, 52: 157300, 53: 164300, 54: 171500,
            55: 178800, 56: 186300, 57: 193900, 58: 201700, 59: 209600, 60: 217700
        };

        const MINIMUM_INVESTMENT = 1000;

        // DOM Elements
        const datePickerButton = document.getElementById('datePickerButton');
        const datePicker = document.getElementById('datePicker');
        const selectedDateSpan = document.getElementById('selectedDate');
        const cancelButton = document.getElementById('cancelButton');
        const doneButton = document.getElementById('doneButton');
        const dayScroll = document.getElementById('dayScroll');
        const monthScroll = document.getElementById('monthScroll');
        const yearScroll = document.getElementById('yearScroll');
        const balanceInput = document.getElementById('balance');
        const calculatorForm = document.getElementById('calculatorForm');
        const resultCard = document.getElementById('resultCard');
        const eligibilityResult = document.getElementById('eligibilityResult');
        const darkModeToggle = document.getElementById('darkModeToggle');

        // Date variables
        let selectedDay = 1;
        let selectedMonth = 0; // 0-indexed
        let selectedYear = 1990;
        let isDatePickerOpen = false;

        // Initialize the application
        function init() {
            initDarkMode();
            initDatePicker();
            bindEvents();
            initScrollAnimations();
        }

        // Initialize Dark Mode
        function initDarkMode() {
            // Check for saved preference
            const savedTheme = localStorage.getItem('darkMode');
            if (savedTheme === 'enabled') {
                darkModeToggle.checked = true;
                document.body.classList.add('dark');
                document.getElementById('calculatorCard').classList.add('dark-card');
                document.body.style.backgroundColor = '#0c1220';
                document.body.style.color = '#F8FAFC';
            } else {
                document.body.style.backgroundColor = '#F8FAFC';
                document.body.style.color = '#0c1220';
            }
            
            // Toggle dark mode
            darkModeToggle.addEventListener('change', function() {
                const calculatorCard = document.getElementById('calculatorCard');
                const resultCard = document.getElementById('resultCard');
                
                if (this.checked) {
                    // Switch to dark mode
                    document.body.classList.add('dark');
                    document.body.style.backgroundColor = '#0c1220';
                    document.body.style.color = '#F8FAFC';
                    calculatorCard.classList.add('dark-card');
                    if (resultCard) resultCard.classList.add('dark-card');
                    localStorage.setItem('darkMode', 'enabled');
                } else {
                    // Switch to light mode
                    document.body.classList.remove('dark');
                    document.body.style.backgroundColor = '#F8FAFC';
                    document.body.style.color = '#0c1220';
                    calculatorCard.classList.remove('dark-card');
                    if (resultCard) resultCard.classList.remove('dark-card');
                    localStorage.setItem('darkMode', 'disabled');
                }
            });
        }

        // Initialize Date Picker
        function initDatePicker() {
            const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const currentYear = new Date().getFullYear();
            
            // Generate days (1-31)
            for (let i = 1; i <= 31; i++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'py-2.5 px-4 w-full text-center cursor-pointer transition-all duration-200 text-base';
                dayElement.textContent = i.toString().padStart(2, '0');
                dayElement.dataset.value = i;
                dayElement.addEventListener('click', () => selectDateItem(i, 'day'));
                dayScroll.appendChild(dayElement);
            }
            
            // Generate months (January-December)
            for (let i = 0; i < 12; i++) {
                const monthElement = document.createElement('div');
                monthElement.className = 'py-2.5 px-4 w-full text-center cursor-pointer transition-all duration-200 text-base';
                monthElement.textContent = monthNames[i];
                monthElement.dataset.value = i;
                monthElement.addEventListener('click', () => selectDateItem(i, 'month'));
                monthScroll.appendChild(monthElement);
            }
            
            // Generate years (1950-2008)
            for (let i = currentYear - 60; i <= currentYear - 18; i++) {
                const yearElement = document.createElement('div');
                yearElement.className = 'py-2.5 px-4 w-full text-center cursor-pointer transition-all duration-200 text-base';
                yearElement.textContent = i;
                yearElement.dataset.value = i;
                yearElement.addEventListener('click', () => selectDateItem(i, 'year'));
                yearScroll.appendChild(yearElement);
            }
            
            updateDateDisplay();
            scrollToSelected();
        }

        // Bind event handlers
        function bindEvents() {
            // Date picker toggle
            datePickerButton.addEventListener('click', toggleDatePicker);
            cancelButton.addEventListener('click', closeDatePicker);
            doneButton.addEventListener('click', confirmDateSelection);
            
            // Form submission
            calculatorForm.addEventListener('submit', handleFormSubmit);
            calculatorForm.addEventListener('reset', handleFormReset);
            
            // Close date picker when clicking outside
            document.addEventListener('click', function(event) {
                if (!datePicker.contains(event.target) && event.target !== datePickerButton && event.target !== selectedDateSpan) {
                    closeDatePicker();
                }
            });
        }

        // Toggle date picker visibility
        function toggleDatePicker() {
            if (isDatePickerOpen) {
                closeDatePicker();
            } else {
                datePicker.classList.remove('hidden');
                isDatePickerOpen = true;
                scrollToSelected();
            }
        }

        // Close date picker
        function closeDatePicker() {
            datePicker.classList.add('hidden');
            isDatePickerOpen = false;
        }

        // Confirm date selection
        function confirmDateSelection() {
            closeDatePicker();
            calculateAge();
        }

        // Select date item (day, month, year)
        function selectDateItem(value, type) {
            if (type === 'day') {
                selectedDay = value;
            } else if (type === 'month') {
                selectedMonth = value;
            } else if (type === 'year') {
                selectedYear = value;
            }
            
            updateDateDisplay();
        }

        // Update date display
        function updateDateDisplay() {
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const date = new Date(selectedYear, selectedMonth, selectedDay);
            const formattedDate = `${monthNames[selectedMonth]} ${selectedDay}, ${selectedYear}`;
            selectedDateSpan.textContent = formattedDate;
        }

        // Scroll to selected date values
        function scrollToSelected() {
            setTimeout(() => {
                // Scroll to selected day
                const dayElements = dayScroll.querySelectorAll('div');
                const selectedDayElement = Array.from(dayElements).find(el => parseInt(el.dataset.value) === selectedDay);
                if (selectedDayElement) {
                    selectedDayElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                // Scroll to selected month
                const monthElements = monthScroll.querySelectorAll('div');
                const selectedMonthElement = Array.from(monthElements).find(el => parseInt(el.dataset.value) === selectedMonth);
                if (selectedMonthElement) {
                    selectedMonthElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                // Scroll to selected year
                const yearElements = yearScroll.querySelectorAll('div');
                const selectedYearElement = Array.from(yearElements).find(el => parseInt(el.dataset.value) === selectedYear);
                if (selectedYearElement) {
                    selectedYearElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }

        // Calculate age from selected date
        function calculateAge() {
            const birthDate = new Date(selectedYear, selectedMonth, selectedDay);
            const today = new Date();
            
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            
            return age;
        }

        // Handle form submission
        function handleFormSubmit(event) {
            event.preventDefault();
            
            const balance = parseFloat(balanceInput.value);
            if (isNaN(balance) || balance < 0) {
                alert('Please enter a valid EPF balance.');
                return;
            }
            
            const age = calculateAge();
            const basicSavingsAmount = getBasicSavings(age);
            const excessAmount = Math.max(0, balance - basicSavingsAmount);
            const investmentAmount = Math.max(0, excessAmount * 0.3);
            
            displayResult(age, balance, basicSavingsAmount, investmentAmount);
        }

        // Get basic savings requirement based on age
        function getBasicSavings(age) {
            if (age >= 60) return basicSavings[60];
            if (age <= 19) return basicSavings[19];
            return basicSavings[age] || basicSavings[45]; // Default to 45+ if age not found
        }

        // Display calculation result
        function displayResult(age, balance, basicSavingsAmount, investmentAmount) {
            // Update result fields with animation
            document.getElementById('resultAge').textContent = `${age} years`;
            document.getElementById('resultAge').classList.add('data-value');
            
            document.getElementById('resultBalance').textContent = `RM ${balance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('resultBalance').classList.add('data-value');
            document.getElementById('resultBalance').style.animationDelay = '0.2s';
            
            document.getElementById('resultBasicSavings').textContent = `RM ${basicSavingsAmount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('resultBasicSavings').classList.add('data-value');
            document.getElementById('resultBasicSavings').style.animationDelay = '0.4s';
            
            // Update eligibility message
            updateEligibilityMessage(investmentAmount, basicSavingsAmount);
            
            // Show result card with animation
            resultCard.classList.remove('hidden');
            setTimeout(() => {
                resultCard.classList.add('visible');
            }, 100);
        }

        // Update eligibility message
        function updateEligibilityMessage(investmentAmount, basicSavingsAmount) {
            let message = '';
            let bgColor = '';
            let textColor = '';
            
            if (investmentAmount >= MINIMUM_INVESTMENT) {
                message = `You are eligible to invest<br><strong class="text-2xl">RM ${investmentAmount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</strong><br>in EPF-approved funds`;
                bgColor = 'bg-success bg-opacity-10';
                textColor = 'text-success';
            } else {
                message = `Your current balance does not meet the minimum investment requirement. You need additional savings to be eligible for EPF investments.`;
                bgColor = 'bg-warning bg-opacity-10';
                textColor = 'text-warning';
            }
            
            eligibilityResult.className = `p-4 rounded-lg ${bgColor} ${textColor} border border-current border-opacity-20`;
            eligibilityResult.innerHTML = message;
        }

        // Handle form reset
        function handleFormReset() {
            // Reset date to default
            selectedDay = 1;
            selectedMonth = 0;
            selectedYear = 1990;
            updateDateDisplay();
            
            // Hide result card
            resultCard.classList.add('hidden');
            resultCard.classList.remove('visible');
        }

        // Initialize scroll animations
        function initScrollAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                threshold: 0.1
            });
            
            document.querySelectorAll('.animate-on-scroll').forEach(el => {
                observer.observe(el);
            });
        }

        // Initialize the application when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body></html>
