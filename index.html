    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        secondary: '#64748B',
                        success: '#059669',
                        warning: '#D97706',
                        danger: '#DC2626',
                        info: '#0891B2',
                        light: '#F8FAFC',
                        dark: '#0F172A',

                        'dark-input': '#334155',
                        'gradient-1': '#3B82F6',

                        'gradient-3': '#1D4ED8',
                        'gradient-4': '#1E40AF',
                        'text-primary': '#1E293B',
                        'text-secondary': '#64748B',
                        'text-light': '#F8FAFC',
                        'text-dark': '#0F172A'
                    },
                    fontFamily: {

                        'body': 1.6,

    <style>
        /* Custom styles */
        .dark-card {
            background: #162032;
            border: 1px solid #2a3a50;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .date-scroll-container {
            height: 10rem;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            position: relative;
        }
        
        .date-scroll-container::-webkit-scrollbar {
            display: none;
        }
        
        .date-highlight {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 3rem;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 10;
        }
        
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Advanced glass morphism effects */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.12), 0 1px 3px 0 rgba(31, 38, 135, 0.08);
        }
        
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25), 0 1px 3px 0 rgba(0, 0, 0, 0.12);
        }
        
        /* Animated background - Subtle Particle Grid */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(59, 130, 246, 0.25) 2px, transparent 2px),
                radial-gradient(circle at 75% 75%, rgba(59, 130, 246, 0.25) 2px, transparent 2px),
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.15) 1px, transparent 1px);
            background-size: 80px 80px, 120px 120px, 60px 60px;
            animation: gridMove 8s linear infinite;
        }
        
        @keyframes gridMove {
            0% { 
                background-position: 
                    0 0, 
                    60px 60px, 
                    30px 30px;
            }
            100% { 
                background-position: 
                    80px 80px, 
                    120px 120px, 
                    60px 60px;
            }
        }
        
        /* Neon glow effects */
        .neon-glow {
            box-shadow: 0 0 5px theme('colors.primary'), 0 0 20px theme('colors.primary');
        }
        
        /* Data animation effects */
        .data-value {
            display: inline-block;
            opacity: 0;
            transform: translateY(10px);
            animation: slideUp 0.6s ease forwards;
        }
        
        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Button ripple effect */
        .btn-ripple {
            position: relative;
            overflow: hidden;
        }
        
        .btn-ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn-ripple:active::after {
            width: 300px;
            height: 300px;
        }
        
        /* Input focus animation */
        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .dark .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
        }
        
        .dark .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .ios-toggle {
            position: relative;
            display: inline-block;
            width: 3rem;
            height: 1.5rem;
            transition: all 0.2s ease;
        }
        
        .ios-toggle-checkbox {
            position: absolute;
            display: block;
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            background: white;
            border: 4px solid #d1d5db;
            appearance: none;
            cursor: pointer;
            transition: all 0.2s ease;
            left: 0;
            top: 0;
            z-index: 10;
        }
        
        .ios-toggle-checkbox:checked {
            transform: translateX(1.5rem);
            border-color: white;
        }
        
        .ios-toggle-bg {
            position: absolute;
            display: block;
            width: 3rem;
            height: 1.5rem;
            border-radius: 0.75rem;
            background: #d1d5db;
            transition: all 0.2s ease;
        }
        
        .ios-toggle-checkbox:checked + .ios-toggle-bg {
            background: #3B82F6;
        }
        
        .bg-gradient-light {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        
        .text-gradient {
            background: linear-gradient(135deg, #3B82F6 0%, #60A5FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .bg-gradient-primary {
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 50%, #1D4ED8 100%);
        }
        
        .bg-gradient-secondary {
            background: linear-gradient(135deg, #64748B 0%, #475569 100%);
        }
        
        .bg-gradient-success {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
        }
        
        .bg-gradient-warning {
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
        }
        
        .bg-gradient-danger {
            background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
        }
        
        .bg-gradient-dark {
            background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
        }
        
        .bg-gradient-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.08));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .dark .bg-gradient-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Typography Utility Classes */
        .h1 {
            @apply text-clamp-h1 font-bold leading-heading tracking-tight;
        }
        
        .h2 {
            @apply text-clamp-h2 font-bold leading-heading tracking-tight;
        }
        
        .h3 {
            @apply text-clamp-h3 font-bold leading-heading tracking-tight;
        }
        
        .body-text {
            @apply text-clamp-body leading-body tracking-normal;
        }
        
        .body-sm {
            @apply text-clamp-sm leading-body tracking-normal;
        }
        
        .bg-gradient-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .dark .bg-gradient-card {
            background: rgba(22, 32, 50, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .card-glow {
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }
        
        .dark .card-glow {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .btn-shine {
            position: relative;
            overflow: hidden;
        }
        
        .btn-shine::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-shine:hover::before {
            left: 100%;
        }
        
        .input-focus-ring {
            transition: all 0.3s ease;
        }
        
        .input-focus-ring:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }
        
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }
        
        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Dark data dashboard specific styles */
        .dark .bg-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
        }
        
        .dark .gradient-border::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #3B82F6, #60A5FA);
        }
    </style>
</head>
<body class="bg-gradient-dark min-h-screen font-sans text-text-light dark:text-text-light overflow-x-hidden">

            43: 100800, 44: 106500, 45: 108000, 46: 118300, 47: 124400, 48: 130700,
            49: 137100, 50: 143700, 51: 150400, 52: 157300, 53: 164300, 54: 171500,
            55: 178800, 56: 186300, 57: 193900, 58: 201700, 59: 209600, 60: 217700

        const MINIMUM_INVESTMENT = 1000;

        // DOM Elements
        const datePickerButton = document.getElementById('datePickerButton');
        const datePicker = document.getElementById('datePicker');
        const selectedDateSpan = document.getElementById('selectedDate');
        const cancelButton = document.getElementById('cancelButton');
        const doneButton = document.getElementById('doneButton');

        const monthScroll = document.getElementById('monthScroll');
        const yearScroll = document.getElementById('yearScroll');
        const balanceInput = document.getElementById('balance');
        const calculatorForm = document.getElementById('calculatorForm');
        const resultModal = document.getElementById('resultModal');
        const resultCard = document.getElementById('resultCard');
        const closeModalButton = document.getElementById('closeModalButton');
        const eligibilityResult = document.getElementById('eligibilityResult');
        const darkModeToggle = document.getElementById('darkModeToggle');

        // Date variables
        let selectedDay = 1;
        let selectedMonth = 0; // 0-indexed
        let selectedYear = 1990;
        let isDatePickerOpen = false;

        // Initialize the application
        function init() {
            initDarkMode();
            initDatePicker();
            bindEvents();
            initScrollAnimations();
        }


        
        // Initialize Dark Mode
        function initDarkMode() {
            // Check for saved preference
            const savedTheme = localStorage.getItem('darkMode');
            if (savedTheme === 'enabled') {
                darkModeToggle.checked = true;
                document.body.classList.add('dark');
                document.getElementById('calculatorCard').classList.add('dark-card');
                document.body.style.backgroundColor = '#0F172A';
                document.body.style.color = '#F8FAFC';
            } else {
                document.body.style.backgroundColor = '#F8FAFC';
                document.body.style.color = '#0F172A';
            }
            
            // Toggle dark mode
            darkModeToggle.addEventListener('change', function() {
                const calculatorCard = document.getElementById('calculatorCard');
                const resultCard = document.getElementById('resultCard');
                
                if (this.checked) {
                    // Switch to dark mode
                    document.body.classList.add('dark');
                    document.body.style.backgroundColor = '#0F172A';
                    document.body.style.color = '#F8FAFC';
                    calculatorCard.classList.add('dark-card');
                    if (resultCard) resultCard.classList.add('dark-card');
                    localStorage.setItem('darkMode', 'enabled');
                } else {
                    // Switch to light mode
                    document.body.classList.remove('dark');
                    document.body.style.backgroundColor = '#F8FAFC';
                    document.body.style.color = '#0c1220';
                    calculatorCard.classList.remove('dark-card');
                    if (resultCard) resultCard.classList.remove('dark-card');
                    localStorage.setItem('darkMode', 'disabled');
                }
            });
        }

        // Initialize Date Picker
        function initDatePicker() {
            const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const currentYear = new Date().getFullYear();
            
            // Generate days (1-31)
            for (let i = 1; i <= 31; i++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'py-2.5 px-4 w-full text-center cursor-pointer transition-all duration-200 text-base';
                dayElement.textContent = i.toString().padStart(2, '0');
                dayElement.dataset.value = i;
                dayElement.addEventListener('click', () => selectDateItem(i, 'day'));
                dayScroll.appendChild(dayElement);
            }
            
            // Generate months (January-December)
            for (let i = 0; i < 12; i++) {
                const monthElement = document.createElement('div');
                monthElement.className = 'py-2.5 px-4 w-full text-center cursor-pointer transition-all duration-200 text-base';
                monthElement.textContent = monthNames[i];
                monthElement.dataset.value = i;
                monthElement.addEventListener('click', () => selectDateItem(i, 'month'));
                monthScroll.appendChild(monthElement);
            }
            
            // Generate years (1950-2008)
            for (let i = currentYear - 60; i <= currentYear - 18; i++) {
                const yearElement = document.createElement('div');
                yearElement.className = 'py-2.5 px-4 w-full text-center cursor-pointer transition-all duration-200 text-base';
                yearElement.textContent = i;
                yearElement.dataset.value = i;
                yearElement.addEventListener('click', () => selectDateItem(i, 'year'));
                yearScroll.appendChild(yearElement);
            }
            
            // Add scroll event listeners for auto-selection
            dayScroll.addEventListener('scroll', () => autoSelectDateItem(dayScroll, 'day'));
            monthScroll.addEventListener('scroll', () => autoSelectDateItem(monthScroll, 'month'));
            yearScroll.addEventListener('scroll', () => autoSelectDateItem(yearScroll, 'year'));
            
            // Add wheel event listeners for better mobile experience
            dayScroll.addEventListener('wheel', (e) => {
                e.preventDefault();
                dayScroll.scrollTop += e.deltaY;
            });
            monthScroll.addEventListener('wheel', (e) => {
                e.preventDefault();
                monthScroll.scrollTop += e.deltaY;
            });
            yearScroll.addEventListener('wheel', (e) => {
                e.preventDefault();
                yearScroll.scrollTop += e.deltaY;
            });
            
            updateDateDisplay();
            scrollToSelected();
        }
        
        // Auto-select date item based on scroll position
        function autoSelectDateItem(scrollContainer, type) {
            const items = scrollContainer.querySelectorAll('div');
            const containerRect = scrollContainer.getBoundingClientRect();
            const containerCenter = containerRect.top + containerRect.height / 2;
            
            let closestItem = null;
            let minDistance = Infinity;
            
            items.forEach(item => {
                const itemRect = item.getBoundingClientRect();
                const itemCenter = itemRect.top + itemRect.height / 2;
                const distance = Math.abs(itemCenter - containerCenter);
                
                if (distance < minDistance) {
                    minDistance = distance;
                    closestItem = item;
                }
            });
            
            if (closestItem && minDistance < 30) { // Only select if within threshold
                const value = parseInt(closestItem.dataset.value);
                selectDateItem(value, type, false); // Don't scroll again to avoid infinite loop
                
                // Highlight the selected item
                items.forEach(item => item.classList.remove('bg-blue-100', 'dark:bg-blue-900/30', 'font-semibold', 'text-blue-600', 'dark:text-blue-400'));
                closestItem.classList.add('bg-blue-100', 'dark:bg-blue-900/30', 'font-semibold', 'text-blue-600', 'dark:text-blue-400');
            }
        }

        // Bind event handlers
        function bindEvents() {
            // Date picker toggle
            datePickerButton.addEventListener('click', toggleDatePicker);
            cancelButton.addEventListener('click', closeDatePicker);
            doneButton.addEventListener('click', confirmDateSelection);
            
            // Form submission
            calculatorForm.addEventListener('submit', handleFormSubmit);
            calculatorForm.addEventListener('reset', handleFormReset);
            
            // Close date picker when clicking outside
            document.addEventListener('click', function(event) {
                if (!datePicker.contains(event.target) && event.target !== datePickerButton && event.target !== selectedDateSpan) {
                    closeDatePicker();
                }
            });
            
            // Modal close events
            closeModalButton.addEventListener('click', closeModal);
            resultModal.addEventListener('click', function(event) {
                if (event.target === resultModal || event.target === this.firstElementChild) {
                    closeModal();
                }
            });
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape' && !resultModal.classList.contains('hidden')) {
                    closeModal();
                }
            });
        }

        // Toggle date picker visibility
        function toggleDatePicker() {
            if (isDatePickerOpen) {
                closeDatePicker();
            } else {
                datePicker.classList.remove('hidden');
                isDatePickerOpen = true;
                scrollToSelected();
            }
        }

        // Close date picker
        function closeDatePicker() {
            datePicker.classList.add('hidden');
            isDatePickerOpen = false;
        }

        // Confirm date selection
        function confirmDateSelection() {
            closeDatePicker();
            calculateAge();
        }

        // Select date item (day, month, year)
        function selectDateItem(value, type, shouldScroll = true) {
            if (type === 'day') {
                selectedDay = value;
            } else if (type === 'month') {
                selectedMonth = value;
            } else if (type === 'year') {
                selectedYear = value;
            }
            
            updateDateDisplay();
            if (shouldScroll) {
                scrollToSelected();
            }
        }

        // Update date display
        function updateDateDisplay() {
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const date = new Date(selectedYear, selectedMonth, selectedDay);
            const formattedDate = `${monthNames[selectedMonth]} ${selectedDay}, ${selectedYear}`;
            selectedDateSpan.textContent = formattedDate;
        }

        // Scroll to selected date values
        function scrollToSelected() {
            setTimeout(() => {
                // Scroll to selected day
                const dayElements = dayScroll.querySelectorAll('div');
                const selectedDayElement = Array.from(dayElements).find(el => parseInt(el.dataset.value) === selectedDay);
                if (selectedDayElement) {
                    selectedDayElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                // Scroll to selected month
                const monthElements = monthScroll.querySelectorAll('div');
                const selectedMonthElement = Array.from(monthElements).find(el => parseInt(el.dataset.value) === selectedMonth);
                if (selectedMonthElement) {
                    selectedMonthElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                // Scroll to selected year
                const yearElements = yearScroll.querySelectorAll('div');
                const selectedYearElement = Array.from(yearElements).find(el => parseInt(el.dataset.value) === selectedYear);
                if (selectedYearElement) {
                    selectedYearElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }

        // Calculate age from selected date
        function calculateAge() {
            const birthDate = new Date(selectedYear, selectedMonth, selectedDay);
            const today = new Date();
            
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            
            return age;
        }

        // Handle form submission
        function handleFormSubmit(event) {
            event.preventDefault();
            
            const balance = parseFloat(balanceInput.value);
            if (isNaN(balance) || balance < 0) {
                alert('Please enter a valid EPF balance.');
                return;
            }
            
            const age = calculateAge();
            const basicSavingsAmount = getBasicSavings(age);
            const excessAmount = Math.max(0, balance - basicSavingsAmount);
            const investmentAmount = Math.max(0, excessAmount * 0.3);
            
            displayResult(age, balance, basicSavingsAmount, investmentAmount);
        }

        // Get basic savings requirement based on age
        function getBasicSavings(age) {
            if (age >= 60) return basicSavings[60];
            if (age <= 19) return basicSavings[19];
            return basicSavings[age] || basicSavings[45]; // Default to 45+ if age not found
        }

        // Display calculation result
        function displayResult(age, balance, basicSavingsAmount, investmentAmount) {
            // Update result fields with animation
            document.getElementById('resultAge').textContent = `${age} years`;
            document.getElementById('resultAge').classList.add('data-value');
            
            document.getElementById('resultBalance').textContent = `${balance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('resultBalance').classList.add('data-value');
            document.getElementById('resultBalance').style.animationDelay = '0.2s';
            
            document.getElementById('resultBasicSavings').textContent = `${basicSavingsAmount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('resultBasicSavings').classList.add('data-value');
            document.getElementById('resultBasicSavings').style.animationDelay = '0.4s';
            
            // Update eligibility message
            updateEligibilityMessage(investmentAmount, basicSavingsAmount);
            
            // Show result modal with smooth animation
            resultModal.classList.remove('hidden');
            // Force reflow
            resultModal.offsetHeight;
            // Enable backdrop transition
            const backdrop = resultModal.querySelector('.absolute');
            backdrop.style.opacity = '1';
            // Animate content card
            setTimeout(() => {
                resultCard.style.opacity = '1';
                resultCard.style.transform = 'scale(1)';
            }, 100);
        }

        // Update eligibility message
        function updateEligibilityMessage(investmentAmount, basicSavingsAmount) {
            let message = '';
            let bgColor = '';
            let textColor = '';
            
            if (investmentAmount >= MINIMUM_INVESTMENT) {
                message = `You are eligible to invest<br><strong class="text-2xl">${investmentAmount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</strong><br>in EPF-approved funds`;
                bgColor = 'bg-success bg-opacity-10';
                textColor = 'text-success';
            } else {
                message = `Your current balance does not meet the minimum investment requirement. You need additional savings to be eligible for EPF investments.`;
                bgColor = 'bg-warning bg-opacity-10';
                textColor = 'text-warning';
            }
            
            eligibilityResult.className = `p-4 rounded-lg ${bgColor} ${textColor} border border-current border-opacity-20`;
            eligibilityResult.innerHTML = message;
        }

        // Close modal function
        function closeModal() {
            // Animate content card out
            resultCard.style.opacity = '0';
            resultCard.style.transform = 'scale(0.95)';
            
            // Animate backdrop out
            const backdrop = resultModal.querySelector('.absolute');
            backdrop.style.opacity = '0';
            
            setTimeout(() => {
                resultModal.classList.add('hidden');
                // Reset animation classes for next time
                document.querySelectorAll('.data-value').forEach(el => {
                    el.style.animationDelay = '';
                });
                // Reset backdrop opacity
                backdrop.style.opacity = '';
            }, 300);
        }

        // Handle form reset
        function handleFormReset() {
            // Reset date to default
            selectedDay = 1;
            selectedMonth = 0;
            selectedYear = 1990;
            updateDateDisplay();
            
            // Hide result modal
            closeModal();
        }

        // Initialize scroll animations
        function initScrollAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                threshold: 0.1
            });
            
            document.querySelectorAll('.animate-on-scroll').forEach(el => {
                observer.observe(el);
            });
        }

        // Export result as image function - simplified and more reliable version
        function exportResultAsImage() {
            // Show loading state
            const originalText = exportButton.innerHTML;
            exportButton.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> Generating...';
            exportButton.disabled = true;
            
            try {
                // Create a simple HTML structure for export
                const exportContainer = document.createElement('div');
                exportContainer.style.width = '400px';
                exportContainer.style.padding = '20px';
                exportContainer.style.backgroundColor = '#162032';
                exportContainer.style.color = '#f8fafc';
                exportContainer.style.borderRadius = '12px';
                exportContainer.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
                exportContainer.style.position = 'absolute';
                exportContainer.style.left = '-9999px';
                exportContainer.style.zIndex = '9999';
                exportContainer.style.fontFamily = 'Arial, sans-serif';
                
                // Get current calculation data - use more reliable method
                const age = document.getElementById('resultAge').textContent || '35 years';
                const balance = document.getElementById('resultBalance').textContent || '150,000.00';
                const basicSavings = document.getElementById('resultBasicSavings').textContent || '60,800.00';
                
                // Get excess amount and investment amount with fallback values
                let excessAmount = '-';
                let investmentAmount = '-';
                const excessElement = document.getElementById('resultExcessAmount');
                const investmentElement = document.getElementById('resultInvestmentAmount');
                
                if (excessElement && excessElement.textContent && excessElement.textContent !== '.') {
                    excessAmount = excessElement.textContent;
                } else {
                    // Calculate from balance and basic savings if not available
                    const balanceNum = parseFloat(balance.replace(/[^0-9.-]+/g, ''));
                    const basicSavingsNum = parseFloat(basicSavings.replace(/[^0-9.-]+/g, ''));
                    if (!isNaN(balanceNum) && !isNaN(basicSavingsNum)) {
                        const excess = Math.max(0, balanceNum - basicSavingsNum);
                        excessAmount = `${excess.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                        const investment = excess * 0.3;
                        investmentAmount = `${investment.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                    }
                }
                
                if (investmentElement && investmentElement.textContent && investmentElement.textContent !== '.') {
                    investmentAmount = investmentElement.textContent;
                }
                
                // Get eligibility message with fallback
                let eligibilityHtml = document.getElementById('eligibilityResult').innerHTML;
                if (!eligibilityHtml || eligibilityHtml.includes('NaN')) {
                    eligibilityHtml = `You are eligible to invest<div style="margin: 5px 0;"></div><strong class="text-2xl">40,410.00</strong><div style="margin: 5px 0;"></div>in EPF-approved funds`;
                }
                
                // Build the export content
                exportContainer.innerHTML = `
                    <div style="text-align: center; margin-bottom: 20px;">
                        <div style="display: inline-block; padding: 10px; background: linear-gradient(135deg, #3B82F6, #1D4ED8); border-radius: 8px; margin-bottom: 10px;">
                            <i class="fa fa-check-square" style="color: white; font-size: 24px;"></i>
                        </div>
                        <h2 style="color: #3B82F6; margin: 0; font-size: 24px;">Calculation Result</h2>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <h3 style="margin: 0 0 10px 0; font-size: 18px;">Investment Eligibility</h3>
                        <div style="padding: 15px; border-radius: 8px; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0;">
                            ${eligibilityHtml.replace(/<br>/g, '<div style="margin: 5px 0;"></div>')}
                        </div>
                    </div>
                    
                    <div>
                        <h3 style="margin: 0 0 10px 0; font-size: 18px;">Calculation Details</h3>
                        <div style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                                <span style="color: #64748b;">Age:</span>
                                <span style="font-weight: bold;">${age}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                                <span style="color: #64748b;">EPF Balance:</span>
                                <span style="font-weight: bold;">${balance}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                                <span style="color: #64748b;">Basic Savings:</span>
                                <span style="font-weight: bold;">${basicSavings}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                                <span style="color: #64748b;">Excess Amount:</span>
                                <span style="font-weight: bold;">${excessAmount}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between;">
                                <span style="color: #64748b;">Maximum Investment:</span>
                                <span style="font-weight: bold; color: #3B82F6;">${investmentAmount}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div style="text-align: center; margin-top: 20px; font-size: 12px; color: #64748b;">
                        <p>Generated by EPF Calculator</p>
                        <p>Date: ${new Date().toLocaleDateString()}</p>
                    </div>
                `;
                
                // Add to document
                document.body.appendChild(exportContainer);
                
                // Use html2canvas with minimal configuration
                html2canvas(exportContainer, {
                    backgroundColor: '#ffffff',
                    scale: 2,
                    useCORS: true,
                    logging: false
                }).then(canvas => {
                    // Remove temporary element
                    document.body.removeChild(exportContainer);
                    
                    // Convert to image and download
                    const imgData = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.href = imgData;
                    link.download = 'EPF-Calculation-Result.png';
                    link.click();
                    
                    // Success feedback
                    exportButton.innerHTML = '<i class="fa fa-check mr-2"></i> Exported!';
                    setTimeout(() => {
                        exportButton.innerHTML = originalText;
                        exportButton.disabled = false;
                    }, 2000);
                    
                }).catch(err => {
                    console.error('Canvas generation failed:', err);
                    document.body.removeChild(exportContainer);
                    throw err;
                });
                
            } catch (error) {
                console.error('Export failed:', error);
                exportButton.innerHTML = originalText;
                exportButton.disabled = false;
                alert('Export failed. Please try again.');
            }
        }

        // Initialize the application when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body></html>
